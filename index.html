<head>

  <meta property="og:title" content="Mais Bella Ótica">
  <meta property="og:description" content="Sua melhor visão de estilo e conforto">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://maisbellaoticaportoalegre.com">
  <meta name="theme-color" content="#e13439">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
  <link rel="apple-touch-icon" href="assets/favicon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --red: #e13439;
      --red-hover: #c62e33;
      --whatsapp: #25D366;
      --whatsapp-hover: #1EBE5A;
      --whatsapp-shadow: rgba(37, 211, 102, 0.35);
      --bg: #f5f5f5;
      --card: #ffffff;
      --text-secondary: #888888;
      --text-muted: #aaaaaa;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      --radius-pill: 50px;
      --radius-card: 20px;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html {
      min-height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    html, body {
      margin: 0;
    }

    .hidden {
      display: none !important;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .card {
      width: 100%;
      max-width: 450px;
      background: var(--card);
      border: 2px solid var(--red);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow);
      padding: 40px 28px 40px;
      text-align: center;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    /* ─── Animations ─── */

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.85);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    .card {
      animation: fadeInUp 0.6s ease both;
    }

    /* ─── Header ─── */

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 20px;
      overflow: hidden;
      border: 2px solid var(--red);
      background: #fff;
      position: relative;
      animation: fadeInScale 0.5s ease 0.1s both, float 4s ease-in-out 1s infinite;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .avatar:hover {
      transform: scale(1.06);
      box-shadow: 0 0 0 4px rgba(225, 52, 57, 0.15);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .avatar:hover img {
      transform: scale(1.08);
    }

    .avatar-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-fallback svg {
      width: 56px;
      height: 56px;
    }

    .slogan {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 600;
      color: var(--red);
      line-height: 1.35;
      margin: 0 0 24px;
      animation: fadeInUp 0.5s ease 0.15s both;
    }

    /* ─── Elfsight Google Reviews ─── */

    .reviews-elfsight {
      height: 280px;
      margin: 0 0 14px;
      animation: fadeInUp 0.5s ease 0.3s both;
    }

    /* ─── Carousel ─── */

    .carousel {
      position: relative;
      width: 100%;
      margin: 0 auto 20px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      animation: fadeInUp 0.5s ease 0.6s both;
    }

    .carousel input[type="radio"] {
      display: none;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      width: 600%;
    }

    .carousel-slide {
      width: 16.666%;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: #f5f5f5;
      overflow: hidden;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #slide1:checked ~ .carousel-track { transform: translateX(0); }
    #slide2:checked ~ .carousel-track { transform: translateX(-16.666%); }
    #slide3:checked ~ .carousel-track { transform: translateX(-33.333%); }
    #slide4:checked ~ .carousel-track { transform: translateX(-50%); }
    #slide5:checked ~ .carousel-track { transform: translateX(-66.666%); }
    #slide6:checked ~ .carousel-track { transform: translateX(-83.333%); }

    /* ─── Carousel Arrows ─── */

    .carousel .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .carousel .arrow:hover {
      background: #fff;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18);
    }

    .carousel .arrow:active {
      transform: translateY(-50%) scale(0.92);
    }

    .arrow-left  { left: 8px; }
    .arrow-right { right: 8px; }

    .arrow::after {
      content: '';
      display: block;
      width: 9px;
      height: 9px;
      border: 2px solid #666;
      border-width: 2px 2px 0 0;
    }

    .arrow-left::after  { transform: rotate(-135deg); margin-left: 3px; }
    .arrow-right::after { transform: rotate(45deg); margin-right: 3px; }

    #slide1:checked ~ .arrow-1 { display: flex; }
    #slide2:checked ~ .arrow-2 { display: flex; }
    #slide3:checked ~ .arrow-3 { display: flex; }
    #slide4:checked ~ .arrow-4 { display: flex; }
    #slide5:checked ~ .arrow-5 { display: flex; }
    #slide6:checked ~ .arrow-6 { display: flex; }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 12px 0 16px;
      animation: fadeInUp 0.5s ease 0.65s both;
    }

    .carousel-dots label {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d0d0d0;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .carousel-dots label:hover {
      background: #b0b0b0;
    }

    #slide1:checked ~ .carousel-dots label:nth-child(1),
    #slide2:checked ~ .carousel-dots label:nth-child(2),
    #slide3:checked ~ .carousel-dots label:nth-child(3),
    #slide4:checked ~ .carousel-dots label:nth-child(4),
    #slide5:checked ~ .carousel-dots label:nth-child(5),
    #slide6:checked ~ .carousel-dots label:nth-child(6) {
      background: var(--red);
      width: 24px;
      border-radius: 4px;
    }

    #slide1:checked ~ .carousel-dots label:nth-child(1):hover,
    #slide2:checked ~ .carousel-dots label:nth-child(2):hover,
    #slide3:checked ~ .carousel-dots label:nth-child(3):hover,
    #slide4:checked ~ .carousel-dots label:nth-child(4):hover,
    #slide5:checked ~ .carousel-dots label:nth-child(5):hover,
    #slide6:checked ~ .carousel-dots label:nth-child(6):hover {
      background: var(--red-hover);
    }

    /* ─── Buttons ─── */

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 20px;
      border-radius: var(--radius-pill);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.5s ease both;
    }

    .btn:active {
      transform: scale(0.97) !important;
    }

    .btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    .btn-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.3;
      min-width: 0;
    }

    .btn-label {
      font-size: 14px;
      font-weight: 500;
    }

    .btn-sub {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.85;
      margin-top: 2px;
    }

    .btn-phone {
      font-size: 13px;
      font-weight: 600;
      margin-top: 1px;
      letter-spacing: 0.3px;
    }

    /* WhatsApp — solid green */
    .btn-whatsapp {
      background: var(--whatsapp);
      color: #fff;
      border-color: var(--whatsapp);
      padding: 18px 24px;
      animation: fadeInUp 0.5s ease 0.2s, pulse-glow 2.5s ease-in-out 1s infinite;
    }

    .btn-whatsapp:hover {
      background: var(--whatsapp-hover);
      border-color: var(--whatsapp-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--whatsapp-shadow);
    }

    .btn-whatsapp:active {
      transform: translateY(0) scale(0.97);
      box-shadow: 0 2px 8px var(--whatsapp-shadow);
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow: 0 0 0 0 var(--whatsapp-shadow);
      }
      50% {
        box-shadow: 0 0 0 12px rgba(37, 211, 102, 0);
      }
    }

    @keyframes shine {
      0% {
        transform: translateX(-100%) rotate(25deg);
      }
      60% {
        transform: translateX(100%) rotate(25deg);
      }
      100% {
        transform: translateX(100%) rotate(25deg);
      }
    }

    .btn-whatsapp::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
      animation: shine 4s ease-in-out infinite;
      pointer-events: none;
    }

    /* Instagram & Catalog — outlined */
    .btn-outline {
      background: #fff;
      color: var(--red);
      border-color: var(--red);
      animation: fadeInUp 0.5s ease 0.5s both;
    }

    .btn-outline:hover {
      background: rgba(225, 52, 57, 0.04);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(225, 52, 57, 0.08);
    }

    .btn-outline:hover svg {
      transform: scale(1.15) rotate(-3deg);
    }

    .btn-outline:active {
      transform: translateY(0) scale(0.97);
      background: rgba(225, 52, 57, 0.08);
    }

    /* ─── Address ─── */

    .address {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 12px 0 20px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-secondary);
      text-decoration: none;
      animation: fadeInUp 0.5s ease 0.5s both;
      transition: color 0.2s;
      padding: 8px 12px;
      border-radius: 8px;
    }

    .address:hover {
      color: var(--red);
      background: rgba(225, 52, 57, 0.04);
    }

    .address svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ─── Footer ─── */

    .footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      animation: fadeInUp 0.5s ease 0.75s both;
    }

    .footer p {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.6;
      letter-spacing: 0.2px;
    }

    /* ─── Responsive ─── */

    @media (max-width: 360px) {
      body {
        padding: 8px;
      }
      .card {
        padding: 20px 14px 20px;
        border-radius: 14px;
      }
      .avatar {
        width: 80px;
        height: 80px;
      }
      .slogan {
        font-size: 17px;
        margin: 0 0 18px;
      }
      .btn {
        padding: 14px 14px;
        font-size: 13px;
      }
      .btn svg {
        width: 18px;
        height: 18px;
      }
      .btn-phone {
        font-size: 12px;
      }
      .btn-sub {
        font-size: 11px;
      }
      .carousel {
        margin-bottom: 16px;
      }
      .carousel-dots {
        padding: 8px 0 12px;
      }
      .address {
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }
      .card {
        padding: 28px 20px 24px;
        border-radius: 16px;
      }
    }

    @media (min-width: 481px) and (max-width: 767px) {
      body {
        padding: 24px;
      }
    }

    @media (min-width: 768px) {
      body {
        padding: 40px;
      }
      .card {
        padding: 48px 36px 36px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-height: 640px) {
      body {
        align-items: flex-start;
        padding-top: 16px;
      }
    }

    @media (min-height: 800px) {
      body {
        align-items: center;
      }
    }
  </style>
</head>
